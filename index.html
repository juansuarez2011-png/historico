<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNTRO FINAL-FIX 30A</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        #map { height: 350px; border-radius: 20px; box-shadow: 8px 8px 16px #bebebe; border: 4px solid #fff; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .card { background: #e0e0e0; padding: 15px; border-radius: 15px; box-shadow: 6px 6px 12px #bebebe; text-align: center; }
        .val { display: block; font-size: 20px; font-weight: bold; color: #1a5276; }
        .lab { font-size: 9px; font-weight: bold; color: #7f8c8d; }
        .btn-ready { background: #27ae60; color: white; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; box-shadow: 4px 4px 10px rgba(0,0,0,0.2); }
        #status { text-align: center; font-weight: bold; font-size: 13px; color: #d35400; padding: 10px; }
    </style>
</head>
<body>

<div style="max-width: 1000px; margin: auto;">
    <h3 style="text-align:center; color:#2c3e50;">SYNTRO ACADEMY: AUDITORÍA TOTAL 30A</h3>
    <div id="map"></div>
    
    <button class="btn-ready" onclick="obtenerDatosYa()">⚡ ACTIVAR AUDITORÍA (NASA CLOUD)</button>
    <div id="status">POR FAVOR, TOQUE UN PUNTO EN EL MAPA</div>

    <div class="grid" id="dash" style="display:none;">
        <div class="card"><span class="lab">LLUVIA ANUAL</span><span id="v-prec" class="val">--</span><span class="lab">mm</span></div>
        <div class="card"><span class="lab">RAD. SOLAR</span><span id="v-rad" class="val">--</span><span class="lab">kW/m²/d</span></div>
        <div class="card"><span class="lab">TEMP. MÁX</span><span id="v-temp" class="val">--</span><span class="lab">°C</span></div>
        <div class="card"><span class="lab">HUMEDAD</span><span id="v-hum" class="val">--</span><span class="lab">%</span></div>
    </div>

    <div class="card" style="height: 300px;"><canvas id="chart"></canvas></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // TU API KEY INTEGRADA
    const MY_KEY = 'lp9QmeplVWPMAFSszhurTgCwojxEtvFbc0lxoLeF';
    const map = L.map('map').setView([10.5, -71.6], 10);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    let marker, lat, lon, myChart;

    map.on('click', (e) => {
        lat = e.latlng.lat; lon = e.latlng.lng;
        if(marker) map.removeLayer(marker);
        marker = L.circleMarker(e.latlng, {radius: 10, color: '#e67e22', fillOpacity: 0.8}).addTo(map);
        document.getElementById('status').innerText = `PUNTO LISTO: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
        document.getElementById('status').style.color = "#27ae60";
    });

    async function obtenerDatosYa() {
        if(!lat) return alert("Primero marque un punto en el mapa");
        const status = document.getElementById('status');
        status.innerText = "🛰️ SOLICITANDO DATOS A LA NASA (PASANDO POR TÚNEL)...";

        // URL LIMPIA PARA CLIMATOLOGÍA
        const url = `https://power.larc.nasa.gov/api/temporal/climatology/point?parameters=T2M_MAX,RH2M,PRECTOTCORR,ALLSKY_SFC_SW_DW&community=AG&longitude=${lon}&latitude=${lat}&format=JSON&api_key=${MY_KEY}`;

        try {
            // Usamos un proxy público para saltar el bloqueo de CORS si es necesario
            const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
            
            const r = await fetch(proxyUrl);
            const responseData = await r.json();
            const res = JSON.parse(responseData.contents); // Extraemos el JSON de la NASA

            if(res.properties && res.properties.parameter) {
                pintar(res.properties.parameter);
            } else {
                throw new Error();
            }
        } catch(e) {
            status.innerText = "🔄 EL SERVIDOR TARDÓ EN RESPONDER. INTENTE OTRA VEZ.";
            status.style.color = "#c0392b";
        }
    }

    function pintar(p) {
        const meses = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
        const prec = Object.values(p.PRECTOTCORR).slice(0,12);
        const rad = Object.values(p.ALLSKY_SFC_SW_DW).slice(0,12);
        const temp = Object.values(p.T2M_MAX).slice(0,12);
        const hum = Object.values(p.RH2M).slice(0,12);

        document.getElementById('dash').style.display = 'grid';
        document.getElementById('v-prec').innerText = prec.reduce((a,b)=>a+b, 0).toFixed(1);
        document.getElementById('v-rad').innerText = (rad.reduce((a,b)=>a+b, 0)/12).toFixed(2);
        document.getElementById('v-temp').innerText = (temp.reduce((a,b)=>a+b, 0)/12).toFixed(1);
        document.getElementById('v-hum').innerText = (hum.reduce((a,b)=>a+b, 0)/12).toFixed(1);
        document.getElementById('status').innerText = "✅ DATOS DE 30 AÑOS CARGADOS CON ÉXITO";

        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('chart'), {
            type: 'bar',
            data: {
                labels: meses,
                datasets: [
                    { label: 'Lluvia (mm)', data: prec, backgroundColor: '#1a5276', yAxisID: 'y' },
                    { label: 'Temp Máx (°C)', data: temp, type: 'line', borderColor: '#e74c3c', yAxisID: 'y1' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    y: { beginAtZero: true },
                    y1: { position: 'right', grid:{display:false} }
                }
            }
        });
    }
</script>
</body>
</html>
