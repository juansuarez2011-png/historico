<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNTRO OMNI-LINK 30A</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        #map { height: 350px; border-radius: 20px; border: 2px solid #333; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .card { background: #252525; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #444; }
        .val { display: block; font-size: 20px; font-weight: bold; color: #3498db; }
        .lab { font-size: 9px; text-transform: uppercase; color: #888; }
        .btn-omni { background: #27ae60; color: white; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-omni:hover { background: #2ecc71; }
        #status { text-align: center; font-size: 12px; margin: 10px; color: #f1c40f; }
    </style>
</head>
<body>

<div style="max-width: 1000px; margin: auto;">
    <h3 style="text-align:center;">SYNTRO ACADEMY: AUDITORÍA 30 AÑOS</h3>
    <div id="map"></div>
    
    <button class="btn-omni" onclick="superConexion()">🚀 INICIAR ESCANEO MULTI-CANAL</button>
    <div id="status">POR FAVOR, MARQUE UN PUNTO EN EL MAPA</div>

    <div class="grid" id="dash" style="display:none;">
        <div class="card"><span class="lab">Lluvia Total</span><span id="v-prec" class="val">--</span><span class="lab">mm</span></div>
        <div class="card"><span class="lab">Rad. Solar</span><span id="v-rad" class="val">--</span><span class="lab">kW/m²/d</span></div>
        <div class="card"><span class="lab">Temp. Máx</span><span id="v-temp" class="val">--</span><span class="lab">°C</span></div>
        <div class="card"><span class="lab">Humedad</span><span id="v-hum" class="val">--</span><span class="lab">%</span></div>
    </div>

    <div class="card" style="height: 300px;"><canvas id="chart"></canvas></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const CLAVE = 'lp9QmeplVWPMAFSszhurTgCwojxEtvFbc0lxoLeF';
    const map = L.map('map').setView([10.5, -71.6], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let marker, lat, lon, chart;

    map.on('click', (e) => {
        lat = e.latlng.lat; lon = e.latlng.lng;
        if(marker) map.removeLayer(marker);
        marker = L.circleMarker(e.latlng, {radius: 10, color: '#27ae60'}).addTo(map);
        document.getElementById('status').innerText = `PUNTO LISTO: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
    });

    async function superConexion() {
        if(!lat) return;
        const status = document.getElementById('status');
        status.innerText = "🛰️ BUSCANDO CANAL LIBRE EN LA NUBE...";

        const urlBase = `https://power.larc.nasa.gov/api/temporal/climatology/point?parameters=T2M_MAX,RH2M,PRECTOTCORR,ALLSKY_SFC_SW_DW&community=AG&longitude=${lon}&latitude=${lat}&format=JSON&api_key=${CLAVE}`;

        // Intentamos por 3 vías al mismo tiempo
        const vias = [
            urlBase,
            "https://api.allorigins.win/get?url=" + encodeURIComponent(urlBase),
            "https://corsproxy.io/?" + encodeURIComponent(urlBase)
        ];

        for (let via of vias) {
            try {
                status.innerText = "📡 PROBANDO VÍA: " + (vias.indexOf(via) + 1);
                const r = await fetch(via);
                let data;
                if (via.includes("allorigins")) {
                    const temp = await r.json();
                    data = JSON.parse(temp.contents);
                } else if (via.includes("corsproxy")) {
                    data = await r.json();
                } else {
                    data = await r.json();
                }

                if (data.properties) {
                    procesar(data.properties.parameter);
                    return; // Si uno funciona, paramos los demás
                }
            } catch (e) {
                console.log("Vía fallida, intentando siguiente...");
            }
        }
        status.innerText = "❌ TODOS LOS CANALES SATURADOS. REINTENTE EN 10 SEGUNDOS.";
    }

    function procesar(p) {
        const meses = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
        const prec = Object.values(p.PRECTOTCORR).slice(0,12);
        const rad = Object.values(p.ALLSKY_SFC_SW_DW).slice(0,12);
        const temp = Object.values(p.T2M_MAX).slice(0,12);
        const hum = Object.values(p.RH2M).slice(0,12);

        document.getElementById('dash').style.display = 'grid';
        document.getElementById('v-prec').innerText = prec.reduce((a,b)=>a+b, 0).toFixed(1);
        document.getElementById('v-rad').innerText = (rad.reduce((a,b)=>a+b, 0)/12).toFixed(2);
        document.getElementById('v-temp').innerText = (temp.reduce((a,b)=>a+b, 0)/12).toFixed(1);
        document.getElementById('v-hum').innerText = (hum.reduce((a,b)=>a+b, 0)/12).toFixed(1);
        document.getElementById('status').innerText = "✅ ¡CONEXIÓN ESTABLECIDA!";

        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('chart'), {
            type: 'bar',
            data: {
                labels: meses,
                datasets: [{ label: 'Lluvia (mm)', data: prec, backgroundColor: '#3498db' }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
